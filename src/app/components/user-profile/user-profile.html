<h2>User Profile Form</h2>

<div>
  <label>Name</label>
  <br>
  <input type="text" [(ngModel)]="name">

  <br><br>

  <label>Email</label>
  <br>
  <input type="email" [(ngModel)]="email">

  <br><br>

  <label>Mobile</label>
  <br>
  <input type="text" [(ngModel)]="mobile">

  <br><br>

  <button (click)="save()">Save</button>
</div>
